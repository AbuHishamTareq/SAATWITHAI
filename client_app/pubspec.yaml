name: client_app
description: "SAAT - Service Booking App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.0

  # Networking
  dio: ^5.8.0
  pretty_dio_logger: ^1.4.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Firebase
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  firebase_analytics: ^11.4.4

  # Maps & location
  google_maps_flutter: ^2.12.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Localization & formatting
  intl: ^0.20.2

  # Error tracking
  sentry_flutter: ^8.14.2

  # Utilities
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.4
  json_serializable: ^6.9.4
  go_router_builder: ^2.7.5
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true

  generate: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
